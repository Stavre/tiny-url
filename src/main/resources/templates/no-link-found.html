<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Not Found - TinyURL</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Error page specific styles */
        .error-container {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .error-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            padding: 3rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        .error-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #ff6b6b);
            background-size: 200% 100%;
            animation: gradientMove 3s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error-icon {
            font-size: 8rem;
            line-height: 1;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
            position: relative;
        }

        .error-icon .broken-link {
            position: relative;
            display: inline-block;
        }

        .error-icon .broken-link::before,
        .error-icon .broken-link::after {
            content: '🔗';
            position: absolute;
            animation: spin 2s linear infinite;
        }

        .error-icon .broken-link::before {
            left: -20px;
            opacity: 0.5;
        }

        .error-icon .broken-link::after {
            right: -20px;
            opacity: 0.5;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
            /*animation: pulse 2s ease-in-out infinite;*/
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .error-title {
            font-size: 2rem;
            color: #333;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .error-message {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .error-details {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: left;
        }

        .error-details h3 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .error-details h3::before {
            content: '🔍';
            font-size: 1.2rem;
        }

        .error-details ul {
            list-style: none;
            padding: 0;
        }

        .error-details li {
            padding: 0.75rem 0;
            color: #666;
            border-bottom: 1px dashed #dee2e6;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .error-details li:last-child {
            border-bottom: none;
        }

        .error-details li::before {
            content: '•';
            color: #4a90e2;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .requested-link {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            color: #856404;
            font-family: monospace;
            word-break: break-all;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            min-width: 200px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-secondary:hover {
            background: #f8f9fa;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .btn-home {
            background: #f8f9fa;
            color: #666;
            border: 1px solid #dee2e6;
        }

        .btn-home:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .suggestions {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #dee2e6;
        }

        .suggestions h4 {
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
        }

        .suggestion-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .suggestion-card {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 12px;
            text-align: left;
            transition: all 0.3s ease;
        }

        .suggestion-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background: white;
        }

        .suggestion-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .suggestion-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .suggestion-description {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .suggestion-link {
            color: #4a90e2;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .suggestion-link:hover {
            text-decoration: underline;
        }

        .suggestion-link::after {
            content: '→';
            transition: transform 0.3s;
        }

        .suggestion-link:hover::after {
            transform: translateX(5px);
        }

        .countdown-timer {
            margin-top: 2rem;
            color: #666;
            font-size: 0.9rem;
        }

        .countdown {
            font-weight: 600;
            color: #4a90e2;
        }

        .search-form {
            margin: 2rem 0;
            display: flex;
            gap: 0.5rem;
        }

        .search-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid #dee2e6;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74,144,226,0.1);
        }

        .search-button {
            padding: 0.75rem 1.5rem;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-button:hover {
            background: #357abd;
        }

        @media (max-width: 768px) {
            .error-card {
                padding: 2rem;
            }

            .error-code {
                font-size: 6rem;
            }

            .error-title {
                font-size: 1.5rem;
            }

            .error-message {
                font-size: 1rem;
            }

            .btn {
                width: 100%;
                min-width: auto;
            }

            .action-buttons {
                flex-direction: column;
            }

            .suggestion-cards {
                grid-template-columns: 1fr;
            }
        }

        /* Animated background elements */
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-element {
            position: absolute;
            opacity: 0.1;
            animation: float random 20s linear infinite;
        }

        .floating-element:nth-child(1) {
            top: 10%;
            left: 10%;
            font-size: 4rem;
            animation-delay: 0s;
        }

        .floating-element:nth-child(2) {
            bottom: 20%;
            right: 15%;
            font-size: 5rem;
            animation-delay: 5s;
        }

        .floating-element:nth-child(3) {
            top: 50%;
            left: 80%;
            font-size: 3rem;
            animation-delay: 10s;
        }
    </style>
</head>
<body>
<div class="container">
    <main style="background: none; box-shadow: none; padding: 0;">
        <div class="error-container">
            <div class="error-card">

                <!-- Error code -->
                <div class="error-code">404</div>

                <!-- Error title -->
                <h1 class="error-title">Link Not Found</h1>

                <!-- Error message -->
                <p class="error-message">
                    The short link you're looking for doesn't exist or has been removed.
                </p>

                <!-- Error details section -->
                <div class="error-details">
                    <h3>Possible reasons:</h3>
                    <ul>
                        <li>The link may have expired (free links expire after 3 days)</li>
                        <li>The link may have been removed by the owner</li>
                        <li>The URL might be typed incorrectly</li>
                    </ul>
                </div>

                <!-- Action buttons -->
                <div class="action-buttons">
                    <a href="/link/create-link" class="btn btn-primary">
                        Create New Link
                    </a>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
