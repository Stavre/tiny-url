<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Not Found - TinyURL</title>
    <link rel="stylesheet" href="/css/no-link-found.css">
</head>
<body>
<div class="container">
    <main style="background: none; box-shadow: none; padding: 0;">
        <div class="error-container">
            <div class="error-card">

                <!-- Error code -->
                <div class="error-code">404</div>

                <!-- Error title -->
                <h1 class="error-title">Link Not Found</h1>

                <!-- Error message -->
                <p class="error-message">
                    The short link you're looking for doesn't exist or has been removed.
                </p>

                <!-- Error details section -->
                <div class="error-details">
                    <h3>Possible reasons:</h3>
                    <ul>
                        <li>The link may have expired (free links expire after 3 days)</li>
                        <li>The link may have been removed by the owner</li>
                        <li>The URL might be typed incorrectly</li>
                    </ul>
                </div>

                <!-- Action buttons -->
                <div class="action-buttons">
                    <a href="/link/create-link" class="btn btn-primary">
                        Create New Link
                    </a>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
