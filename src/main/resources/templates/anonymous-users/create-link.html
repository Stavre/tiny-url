<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tiny URL replica</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<main class="container">
    <section class="card" aria-labelledby="page-title">
        <h1 id="page-title" class="title">Tiny URL Replica</h1>

        <form th:action="@{/create-link}" th:object="${formData}" method="post" class="form" novalidate>
            <input type="hidden" name="_csrf" th:value="${_csrf.token}" />

            <div class="form-row">
                <label for="inputField" class="label">Enter something</label>
                <input
                        id="inputField"
                        name="url"
                        type="text"
                        class="input"
                        placeholder="Type here…"
                        required
                        aria-required="true"
                />
            </div>

            <div class="form-row">
                <button type="submit" class="btn">Create short link</button>
            </div>
        </form>

        <div th:if="${message}" th:text="${message}" class="message" role="status" aria-live="polite"></div>
    </section>
</main>
</body>
</html>
