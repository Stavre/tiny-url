<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Short Link Details</title>
    <link rel="stylesheet" th:href="@{/css/details.css}" />
</head>
<body>
<main class="container">
    <section class="card" aria-labelledby="page-title">
        <header class="card-header">
            <h1 id="page-title" class="title">🔗 Short Link Details</h1>
            <p class="subtitle">View and manage your shortened URL</p>
        </header>

        <div class="card-body">
            <div class="form-row">
                <label class="label">Short URL</label>
                <div class="value short-url">
                    <a th:href="${redirectLinkFormatter.getRedirectLink(link)}"
                       th:text="${redirectLinkFormatter.getRedirectLink(link)}"
                       target="_blank" rel="noopener noreferrer"></a>
                    <button type="button" id="copyBtn" class="btn small">📋 Copy</button>
                </div>
            </div>

            <div class="form-row">
                <label class="label">Created At</label>
                <div class="value">
                    <time th:text="${#temporals.format(link.createdAt, 'dd MMMM yyyy, HH:mm:ss')}"></time>
                </div>
            </div>

            <div class="form-row">
                <label class="label">Valid Until
                    <span class="status"
                          th:classappend="${link.validUntil != null and link.validUntil.isAfter(T(java.time.LocalDateTime).now())} ? ' valid' : ' expired'"
                          th:text="${link.validUntil != null and link.validUntil.isAfter(T(java.time.LocalDateTime).now())} ? '✓ Valid' : '✗ Expired'">
            </span>
                </label>
                <div class="value">
                    <time th:text="${#temporals.format(link.validUntil, 'dd MMMM yyyy, HH:mm:ss')}"></time>
                </div>
            </div>

            <div class="actions">
                <a class="btn" th:href="@{/create-link}">➕ Create New Link</a>
            </div>
        </div>
    </section>
</main>

<script th:src="@{/js/details.js}" src="/js/details.js"></script>
</body>
</html>
