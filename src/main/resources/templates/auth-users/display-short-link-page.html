<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Link Details</title>
    <link rel="stylesheet" th:href="@{/css/display-short-link-page.css}"/>

</head>
<body>
<!-- Navigation - Full width background, constrained content -->
<nav>
    <div class="nav-container">
        <a href="/" class="logo">tinyurl</a>
        <a href="/dashboard" class="dashboard">dashboard</a>
        <a href="/create-link" class="create-link">create new link</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>🔗 Short Link Details</h1>
            <p>View and manage your shortened URL</p>
        </div>

        <div class="card-body">
            <!-- Short URL Section -->
            <div class="detail-item">
                <div class="detail-label">
                    <span>📎 Short URL</span>
                </div>
                <div class="detail-value short-url">
                    <a th:href="${redirectLinkFormatter.getRedirectLink(link)}" th:text="${redirectLinkFormatter.getRedirectLink(link)}" target="_blank"></a>
                    <button class="copy-button" onclick="copyToClipboard()" id="copyBtn">
                        📋 Copy
                    </button>
                </div>
            </div>

            <!-- Created At Section -->
            <div class="detail-item">
                <div class="detail-label">
                    <span>📅 Created At</span>
                </div>
                <div class="detail-value date-value">
                    <i>🕒</i>
                    <span th:text="${#temporals.format(link.createdAt, 'dd MMMM yyyy, HH:mm:ss')}"></span>
                </div>
            </div>

            <!-- Active Until Section -->
            <div class="detail-item">
                <div class="detail-label">
                    <span>⏰ Active Until</span>
                    <!-- Status Badge based on validity -->
                    <span class="status-badge"
                          th:classappend="${link.activeUntil != null and link.activeUntil.isAfter(T(java.time.LocalDateTime).now())} ? 'status-valid' : 'status-expired'"
                          th:text="${link.activeUntil != null and link.activeUntil.isAfter(T(java.time.LocalDateTime).now())} ? '✓ Valid' : '✗ Expired'">
                        </span>
                </div>
                <div class="detail-value date-value" th:if="${link.activeUntil != null}">
                    <i>⌛</i>
                    <span th:text="${#temporals.format(link.activeUntil, 'dd MMMM yyyy, HH:mm:ss')}"></span>
                </div>
                <div class="detail-value date-value" th:unless="${link.activeUntil != null}">
                    <i>∞</i>
                    <span>Never expires (permanent link)</span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="actions">
                <a href="#" class="btn btn-primary" th:href="@{/create-link}">➕ Create New Link</a>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/display-short-link-page.js}"></script>
</body>
</html>
