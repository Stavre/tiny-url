<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Create Link - TinyURL</title>
    <link rel="stylesheet" th:href="@{/css/create-auth-link.css}"/>
</head>
<body>
<nav class="nav">
    <div class="nav-inner">
        <a class="logo" href="/">tinyurl</a>
        <div class="nav-links">
            <a href="/user/dashboard">dashboard</a>
            <a href="/user/create-link">create new link</a>
        </div>
    </div>
</nav>

<main class="container">
    <header class="page-header">
        <h1 class="title">tinyurl</h1>
        <p class="subtitle">create a short link</p>
    </header>

    <section class="card">
        <div th:if="${success}" class="alert success" th:text="${success}"></div>
        <div th:if="${error}" class="alert error" th:text="${error}"></div>

        <div th:if="${shortUrl}" class="result">
            <div class="hint">your short link:</div>
            <a th:href="${shortUrl}" th:text="${shortUrl}" target="_blank" rel="noopener noreferrer"></a>
        </div>

        <form th:action="@{/user/create-link}" method="post" id="linkForm" class="form">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}" />

            <label class="label required" for="url">original url</label>
            <input
                    id="url"
                    name="url"
                    type="url"
                    placeholder="https://example.com/very/long/url"
                    required
                    th:value="${url}"
            />
            <div class="hint">the long url you want to shorten</div>

            <div class="checkbox-row">
                <input id="enableDates" name="enableDates" type="checkbox" />
                <label for="enableDates">add expiration dates (optional)</label>
            </div>

            <div id="dateFields" class="date-fields" aria-hidden="true">
                <label for="validFrom" class="label">valid from</label>
                <input id="validFrom" name="validFrom" type="datetime-local" th:value="${validFrom}" />

                <label for="validUntil" class="label">valid until</label>
                <input id="validUntil" name="validUntil" type="datetime-local" th:value="${validUntil}" />

                <div class="hint center">leave both empty for a three-day valid link starting now</div>
            </div>

            <div class="actions">
                <button type="submit" class="btn">create link</button>
            </div>
        </form>
    </section>
</main>

<script th:src="@{/js/create-auth-link.js}"></script>
</body>
</html>
