spring:
  application:
    name: tinyurl

  datasource:
    url: "jdbc:h2:mem:testdb"
    driverClassName: org.h2.Driver
    username: admin
    password: admin

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
      platform: h2

app:
  redirect:
    anonymous: "http://localhost:8080/redirect/anonymous/"
    authenticated: "http://localhost:8080/redirect/user/"
